<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache">

  <!-- Open Graph -->
  <meta property="og:title" content="Wild Latias Appeared — Lucas Attias">
  <meta property="og:description" content="Portfolio site of Lucas Attias featuring projects, game development, data science work, and creative experiments bridging analytics, psychology, and design.">
  <meta property="og:image" content="https://lucasattias.com/LatiasPNG.png">
  <meta property="og:url" content="https://lucasattias.com">
  <meta property="og:type" content="website">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfolio, Steam game, music projects, and journal by Lucas Attias.">

  <title>Wild LATIAS Appeared — Lucas Attias</title>

  <link rel="icon" href="favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QP3Y2F1XKV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QP3Y2F1XKV');
  </script>

  <style>
    :root{
      --bg:#0b0d12;
      --fg:#e7ecf7;
      --muted:#a7b0c0;
      --panel:#121620;
      --panel-2:#1b2130;
      --ring:rgba(124,156,255,.5);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:20px;
      min-height:100dvh;
      display:grid;
      place-items:center;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,sans-serif;
      background:var(--bg);
      color:var(--fg);
    }

    .card{
      width:min(900px,100%);
      margin:0 auto;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      overflow:visible;
      position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }

    header{
      padding:24px 24px 8px;
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:relative;
      z-index:3;
    }

    .site-title{
      margin:0;
      font-size:clamp(28px,4vw,36px);
      font-weight:800;
      letter-spacing:.3px;
      font-family:monospace;
    }

    .your-name{
      margin:8px 0 20px;
      color:var(--muted);
      font-weight:600;
    }

    .launcher{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:12px 12px 16px;
      position:relative;
      z-index:4;
    }

    .menu-button{
      width:68px;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--panel-2);
      border:1px solid rgba(255,255,255,.14);
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(0,0,0,.35);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      position:relative;
      z-index:5;
    }

    .menu-button:hover{
      background:#222838;
    }

    .menu-button:focus-visible{
      outline:2px solid var(--ring);
      outline-offset:4px;
    }

    .hamburger{
      width:28px;
      height:3px;
      background:var(--fg);
      position:relative;
      border-radius:2px;
      pointer-events:none;
    }

    .hamburger::before,
    .hamburger::after{
      content:"";
      position:absolute;
      left:0;
      width:28px;
      height:3px;
      background:var(--fg);
      border-radius:2px;
    }

    .hamburger::before{
      top:-8px;
    }

    .hamburger::after{
      top:8px;
    }

    .content-stage{
      position:relative;
      width:100%;
      overflow:visible;
    }

    .hero-wrap{
      position:relative;
      width:100%;
      overflow:hidden;
      border-bottom-left-radius:20px;
      border-bottom-right-radius:20px;
    }

    .hero{
      display:block;
      width:100%;
      max-width:100%;
      height:auto;
      margin:0 auto;
      object-fit:contain;
      object-position:center;
      background:#0b0d12;
      border:0;
      padding:0;
      transition:filter .22s ease, transform .22s ease, opacity .22s ease;
    }

    .hero.is-blurred{
      filter:blur(8px) brightness(.45);
      transform:scale(1.02);
    }

    .hero-dim{
      position:absolute;
      inset:0;
      background:rgba(11,13,18,.18);
      opacity:0;
      pointer-events:none;
      transition:opacity .22s ease;
    }

    .hero-dim.is-active{
      opacity:1;
    }

    .floating-menu{
      position:absolute;
      left:50%;
      top:12px;
      transform:translateX(-50%);
      width:min(720px,calc(100% - 24px));
      max-height:min(70vh,560px);
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      background:rgba(27,33,48,.94);
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      padding:10px;
      z-index:6;
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:opacity .2s ease, visibility .2s ease, transform .2s ease;
    }

    .floating-menu.is-open{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
      transform:translateX(-50%) translateY(0);
    }

    .menu-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:6px 8px 8px;
    }

    .menu-title{
      margin:0 0 0 8px;
      font-size:18px;
      color:var(--muted);
    }

    .close-inline-btn{
      background:transparent;
      border:1px solid rgba(255,255,255,.18);
      color:var(--fg);
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      flex-shrink:0;
    }

    .close-inline-btn:hover{
      background:rgba(255,255,255,.08);
    }

    .tab{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:18px 20px;
      background:transparent;
      color:var(--fg);
      border:0;
      border-radius:15px;
      font-weight:700;
      font-size:36px;
      cursor:pointer;
      text-decoration:none;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .tab:hover,
    .tab:focus-visible{
      background:rgba(255,255,255,.08);
      outline:none;
    }

    .caret{
      width:10px;
      height:10px;
      border-right:2px solid currentColor;
      border-bottom:2px solid currentColor;
      transform:rotate(-45deg);
      transition:transform .18s ease;
      opacity:.85;
      pointer-events:none;
      flex-shrink:0;
    }

    .tab[aria-expanded="true"] .caret{
      transform:rotate(45deg);
    }

    .submenu{
      display:none;
      padding:6px 8px 12px;
    }

    .submenu[data-open="true"]{
      display:block;
    }

    .submenu a{
      display:grid;
      grid-template-columns:22px 1fr;
      align-items:center;
      gap:10px;
      padding:14px;
      color:var(--fg);
      text-decoration:none;
      border-radius:8px;
      font-size:18px;
    }

    .submenu a:hover{
      background:rgba(255,255,255,.06);
    }

    .hint{
      color:var(--muted);
      font-size:12px;
    }

    @media (max-width:540px){
      body{
        padding:8px;
      }

      .card{
        border-radius:14px;
      }

      .hero-wrap{
        border-bottom-left-radius:14px;
        border-bottom-right-radius:14px;
      }

      .floating-menu{
        top:8px;
        width:calc(100% - 16px);
        max-height:65vh;
      }

      .tab{
        font-size:22px;
        padding:16px;
      }

      .submenu a{
        font-size:20px;
        padding:12px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <header>
      <h1 class="site-title">Wild LATIAS Appeared</h1>
      <div class="your-name">Lucas Attias</div>
    </header>

    <div class="launcher">
      <button
        type="button"
        id="menuButton"
        class="menu-button"
        aria-expanded="false"
        aria-controls="floatingMenu"
        aria-label="Open menu">
        <span class="hamburger"></span>
      </button>
    </div>

    <div class="content-stage">
      <div
        id="floatingMenu"
        class="floating-menu"
        aria-label="Site menu"
        aria-hidden="true">
        <div class="menu-header">
          <h2 class="menu-title">Menu</h2>
          <button
            type="button"
            class="close-inline-btn"
            id="closeMenuButton"
            aria-label="Close menu">
            Close ✕
          </button>
        </div>

        <a class="tab" href="/">Home</a>

        <a class="tab" href="/Mission.html">About</a>

        <button
          type="button"
          id="projectsToggle"
          class="tab"
          aria-expanded="false"
          aria-controls="projectsSub">
          <span>Projects</span>
          <span class="caret" aria-hidden="true"></span>
        </button>

        <div id="projectsSub" class="submenu" data-open="false">
          <a href="https://github.com/clefairyx?tab=repositories" target="_blank" rel="noopener">
            <span>💼</span>
            <span>GitHub Repositories <br><span class="hint">Data analyses and other projects</span></span>
          </a>

          <a href="https://store.steampowered.com/app/3519810" target="_blank" rel="noopener">
            <span>🎮</span>
            <span>JungleBoys on Steam<br><span class="hint">Store page</span></span>
          </a>
        </div>
      </div>

      <div class="hero-wrap">
        <img id="heroImage" class="hero" src="LatiasPNG.png" alt="Main page image">
        <div id="heroDim" class="hero-dim" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const menuBtn = document.getElementById('menuButton');
      const floatingMenu = document.getElementById('floatingMenu');
      const closeMenuButton = document.getElementById('closeMenuButton');
      const projectsToggle = document.getElementById('projectsToggle');
      const projectsSub = document.getElementById('projectsSub');
      const heroImage = document.getElementById('heroImage');
      const heroDim = document.getElementById('heroDim');

      if (!menuBtn || !floatingMenu || !closeMenuButton || !projectsToggle || !projectsSub || !heroImage || !heroDim) {
        return;
      }

      function setMenuOpen(open) {
        floatingMenu.classList.toggle('is-open', open);
        floatingMenu.setAttribute('aria-hidden', String(!open));
        menuBtn.setAttribute('aria-expanded', String(open));
        heroImage.classList.toggle('is-blurred', open);
        heroDim.classList.toggle('is-active', open);

        if (!open) {
          projectsToggle.setAttribute('aria-expanded', 'false');
          projectsSub.setAttribute('data-open', 'false');
        }
      }

      function toggleProjects() {
        const expanded = projectsToggle.getAttribute('aria-expanded') === 'true';
        projectsToggle.setAttribute('aria-expanded', String(!expanded));
        projectsSub.setAttribute('data-open', String(!expanded));
      }

      menuBtn.addEventListener('click', function () {
        const isOpen = floatingMenu.classList.contains('is-open');
        setMenuOpen(!isOpen);
      });

      closeMenuButton.addEventListener('click', function () {
        setMenuOpen(false);
      });

      projectsToggle.addEventListener('click', function () {
        toggleProjects();
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          setMenuOpen(false);
        }
      });
    })();
  </script>

</body>
</html>
