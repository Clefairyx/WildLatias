<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8" />

<title>Wild Latias Appeared — Lucas Attias</title>
<meta name="description" content="Portfolio, Steam game, music projects, and journal by Lucas Attias." />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0d12;
--fg:#e7ecf7;
--muted:#a7b0c0;
--panel:#121620;
--panel-2:#1b2130;
--ring:rgba(124,156,255,.5);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
background:var(--bg);
color:var(--fg);
min-height:100svh;
display:grid;
place-items:center;
padding:20px;
}

.card{
width:min(900px,100%);
margin:0 auto;
background:var(--panel);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.45)
}

header{
padding:24px 24px 8px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center
}

.site-title{
margin:0;
font-size:clamp(28px,4vw,36px);
font-weight:800;
letter-spacing:.3px;
font-family: monospace;
}

.your-name{
margin:8px 0 20px 0;
color:var(--muted);
font-weight:600
}

/* MENU BUTTON */

.launcher{
display:flex;
justify-content:center;
align-items:center;
padding:12px
}

.menu-button{
width:60px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
background:var(--panel-2);
border:1px solid rgba(255,255,255,.14);
border-radius:12px;
cursor:pointer;
box-shadow:0 6px 16px rgba(0,0,0,.35)
}

.menu-button:hover{
background:#222838
}

.menu-button:focus-visible{
outline:2px solid var(--ring);
outline-offset:4px
}

/* HAMBURGER ICON */

.hamburger{
width:28px;
height:3px;
background:var(--fg);
position:relative;
border-radius:2px;
}

.hamburger::before,
.hamburger::after{
content:"";
position:absolute;
width:28px;
height:3px;
background:var(--fg);
left:0;
border-radius:2px;
}

.hamburger::before{top:-8px;}
.hamburger::after{top:8px;}

/* MAIN IMAGE */

.hero{
display:block;
max-width:100%;
height:auto;
margin:0 auto;
object-fit:contain;
object-position:center;
background-color:#0b0d12;
border:0;
padding:0;
}

/* OVERLAY MENU */

.overlay{
position:fixed;
inset:0;
display:none;
z-index:50;
background:#0d111a
}

.overlay[data-open="true"]{
display:block
}

.overlay-inner{
max-width:720px;
margin:10vh auto;
background:var(--panel-2);
border:1px solid rgba(255,255,255,.12);
border-radius:16px;
box-shadow:0 25px 80px rgba(0,0,0,.6);
padding:10px
}

.overlay-header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 8px 0 8px
}

.overlay-title{
margin:0 0 4px 8px;
font-size:18px;
color:var(--muted)
}

.close-btn{
background:transparent;
border:1px solid rgba(255,255,255,.18);
color:var(--fg);
border-radius:10px;
padding:8px 10px;
cursor:pointer
}

.close-btn:hover{
background:rgba(255,255,255,.08)
}

.tab{
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:18px 20px;
background:transparent;
color:var(--fg);
border:0;
border-radius:15px;
font-weight:700;
font-size:36px;
cursor:pointer;
text-decoration:none
}

.tab:hover{
background:rgba(255,255,255,.08)
}

.caret{
width:10px;
height:10px;
border-right:2px solid currentColor;
border-bottom:2px solid currentColor;
transform:rotate(-45deg);
opacity:.85
}

.tab[aria-expanded="true"] .caret{
transform:rotate(45deg)
}

.submenu{
display:none;
padding:6px 8px 12px 8px
}

.submenu[data-open="true"]{
display:block
}

.submenu a{
display:grid;
grid-template-columns:22px 1fr;
align-items:center;
gap:10px;
padding:14px;
color:var(--fg);
text-decoration:none;
border-radius:8px;
font-size:18px
}

.submenu a:hover{
background:rgba(255,255,255,.06)
}

.hint{
color:var(--muted);
font-size:12px
}

</style>
</head>

<body>

<div class="card">

<header>
<h1 class="site-title">Wild LATIAS Appeared</h1>
<div class="your-name">Lucas Attias</div>
</header>

<div class="launcher">
<button id="menuButton" class="menu-button" aria-expanded="false" aria-controls="menuOverlay">
<span class="hamburger"></span>
</button>
</div>

<img class="hero" src="LastSupper_home.jpeg" alt="Main page image" />

</div>

<div id="menuOverlay" class="overlay" data-open="false">

<div class="overlay-inner">

<div class="overlay-header">
<h2 class="overlay-title">Browse</h2>
<button class="close-btn" id="closeOverlay">Close ✕</button>
</div>

<a class="tab" href="/">Home</a>

<a class="tab" href="/Mission.html">Mission</a>

<button class="tab" aria-expanded="false" aria-controls="projectsSub">
Projects <span class="caret"></span>
</button>

<div id="projectsSub" class="submenu">

<a href="https://github.com/clefairyx?tab=repositories" target="_blank">
<span>💼</span>
<span>Portfolio<br><span class="hint">GitHub repositories</span></span>
</a>

<a href="https://store.steampowered.com/app/3519810" target="_blank">
<span>🎮</span>
<span>JungleBoys on Steam<br><span class="hint">Store page</span></span>
</a>

</div>
</div>
</div>

<script>

const menuBtn=document.getElementById('menuButton');
const overlay=document.getElementById('menuOverlay');
const closeBtn=document.getElementById('closeOverlay');

function setOverlay(open){
overlay.setAttribute('data-open',String(open));
menuBtn.setAttribute('aria-expanded',String(open));
document.body.style.overflow=open?'hidden':'';
}

menuBtn.addEventListener('click',()=>setOverlay(true));
closeBtn.addEventListener('click',()=>setOverlay(false));

overlay.addEventListener('click',e=>{
if(e.target===overlay) setOverlay(false);
});

document.addEventListener('keydown',e=>{
if(e.key==='Escape') setOverlay(false);
});

document.querySelectorAll('.tab').forEach(tabBtn=>{
tabBtn.addEventListener('click',()=>{
const controls=tabBtn.getAttribute('aria-controls');
const panel=document.getElementById(controls);
const expanded=tabBtn.getAttribute('aria-expanded')==='true';

document.querySelectorAll('.tab').forEach(b=>{
if(b!==tabBtn) b.setAttribute('aria-expanded','false');
});

document.querySelectorAll('.submenu').forEach(s=>{
if(s!==panel) s.setAttribute('data-open','false');
});

tabBtn.setAttribute('aria-expanded',String(!expanded));
if(panel) panel.setAttribute('data-open',String(!expanded));

});
});

</script>

</body>
</html>
