<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache">
  <!-- Open Graph -->
  <meta property="og:title" content="Wild Latias Appeared — Lucas Attias">
  <meta property="og:description" content="Portfolio site of Lucas Attias featuring projects, game development, data science work, and creative experiments bridging analytics, psychology, and design.">
  <meta property="og:image" content="https://lucasattias.com/LatiasPNG.png">
  <meta property="og:url" content="https://lucasattias.com">
  <meta property="og:type" content="website">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfolio, Steam game, music projects, and journal by Lucas Attias.">

  <title>Wild Latias Appeared — Lucas Attias</title>

  <link rel="icon" href="favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QP3Y2F1XKV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QP3Y2F1XKV');
  </script>

  <style>
    :root{
      --bg:#0b0d12;
      --fg:#e7ecf7;
      --muted:#a7b0c0;
      --panel:#121620;
      --panel-2:#1b2130;
      --ring:rgba(124,156,255,.5);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:20px;
      min-height:100dvh;
      display:grid;
      place-items:center;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,sans-serif;
      background:var(--bg);
      color:var(--fg);
    }

    .card{
      width:min(900px,100%);
      margin:0 auto;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }

    header{
      padding:24px 24px 8px;
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .site-title{
      margin:0;
      font-size:clamp(28px,4vw,36px);
      font-weight:800;
      letter-spacing:.3px;
      font-family:monospace;
    }

    .your-name{
      margin:8px 0 20px;
      color:var(--muted);
      font-weight:600;
    }

    .launcher{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:12px;
    }

    .menu-button{
      width:68px;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--panel-2);
      border:1px solid rgba(255,255,255,.14);
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 6px 16px rgba(0,0,0,.35);
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    .menu-button:hover{
      background:#222838;
    }

    .menu-button:focus-visible{
      outline:2px solid var(--ring);
      outline-offset:4px;
    }

    .hamburger{
      width:28px;
      height:3px;
      background:var(--fg);
      position:relative;
      border-radius:2px;
      pointer-events:none;
    }

    .hamburger::before,
    .hamburger::after{
      content:"";
      position:absolute;
      left:0;
      width:28px;
      height:3px;
      background:var(--fg);
      border-radius:2px;
    }

    .hamburger::before{ top:-8px; }
    .hamburger::after{ top:8px; }

    .hero{
      display:block;
      width:100%;
      max-width:100%;
      height:auto;
      margin:0 auto;
      object-fit:contain;
      object-position:center;
      background:#0b0d12;
      border:0;
      padding:0;
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:99999;
      background:rgba(13,17,26,.98);
      padding:16px;
      min-height:100dvh;

      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .overlay.is-open{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }

    .overlay-inner{
      width:min(720px,100%);
      margin:8dvh auto 0;
      background:var(--panel-2);
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      box-shadow:0 25px 80px rgba(0,0,0,.6);
      padding:10px;
    }

    .overlay-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:6px 8px 0;
    }

    .overlay-title{
      margin:0 0 4px 8px;
      font-size:18px;
      color:var(--muted);
    }

    .close-btn{
      background:transparent;
      border:1px solid rgba(255,255,255,.18);
      color:var(--fg);
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .close-btn:hover{
      background:rgba(255,255,255,.08);
    }

    .tab{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:18px 20px;
      background:transparent;
      color:var(--fg);
      border:0;
      border-radius:15px;
      font-weight:700;
      font-size:36px;
      cursor:pointer;
      text-decoration:none;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .tab:hover,
    .tab:focus-visible{
      background:rgba(255,255,255,.08);
      outline:none;
    }

    .caret{
      width:10px;
      height:10px;
      border-right:2px solid currentColor;
      border-bottom:2px solid currentColor;
      transform:rotate(-45deg);
      transition:transform .18s ease;
      opacity:.85;
      pointer-events:none;
    }

    .tab[aria-expanded="true"] .caret{
      transform:rotate(45deg);
    }

    .submenu{
      display:none;
      padding:6px 8px 12px;
    }

    .submenu[data-open="true"]{
      display:block;
    }

    .submenu a{
      display:grid;
      grid-template-columns:22px 1fr;
      align-items:center;
      gap:10px;
      padding:14px;
      color:var(--fg);
      text-decoration:none;
      border-radius:8px;
      font-size:18px;
    }

    .submenu a:hover{
      background:rgba(255,255,255,.06);
    }

    .hint{
      color:var(--muted);
      font-size:12px;
    }

    body.menu-open #menuButton{
      display:none;
    }

    @media (max-width:540px){
      body{ padding:8px; }
      .card{ border-radius:14px; }
      .overlay-inner{ margin:6vh auto 0; }
      .tab{
        font-size:22px;
        padding:16px;
      }
      .submenu a{
        font-size:20px;
        padding:12px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <header>
      <h1 class="site-title">Wild LATIAS Appeared</h1>
      <div class="your-name">Lucas Attias</div>
    </header>

    <div class="launcher">
      <button
        type="button"
        id="menuButton"
        class="menu-button"
        aria-expanded="false"
        aria-controls="menuOverlay">
        <span class="hamburger"></span>
      </button>
    </div>

    <img class="hero" src="LatiasPNG.png" alt="Main page image">
  </div>

  <div
    id="menuOverlay"
    class="overlay"
    role="dialog"
    aria-modal="true"
    aria-label="Site menu">
    <div class="overlay-inner">
      <div class="overlay-header">
        <h2 class="overlay-title">Browse</h2>
        <button
          type="button"
          class="close-btn"
          id="closeOverlay">
          Close ✕
        </button>
      </div>

      <a class="tab" href="/">Home</a>

      <a class="tab" href="/Mission.html">About</a>

      <button
        type="button"
        class="tab"
        aria-expanded="false"
        aria-controls="projectsSub">
        Projects <span class="caret" aria-hidden="true"></span>
      </button>

      <div id="projectsSub" class="submenu" data-open="false">
        <a href="https://github.com/clefairyx?tab=repositories" target="_blank" rel="noopener">
          <span>💼</span>
          <span>Portfolio<br><span class="hint">GitHub repositories</span></span>
        </a>

        <a href="https://store.steampowered.com/app/3519810" target="_blank" rel="noopener">
          <span>🎮</span>
          <span>JungleBoys on Steam<br><span class="hint">Store page</span></span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const menuBtn = document.getElementById('menuButton');
    const overlay = document.getElementById('menuOverlay');
    const closeBtn = document.getElementById('closeOverlay');
    const projectsToggle = document.getElementById('projectsToggle');

    function setOverlay(open) {
      overlay.style.display = open ? 'block' : 'none';
      overlay.setAttribute('data-open', String(open));
      menuBtn.setAttribute('aria-expanded', String(open));
      document.body.style.overflow = open ? 'hidden' : '';
      document.body.classList.toggle('menu-open', open);

      if (open) {
        overlay.offsetHeight;
      }
      if (!open) {
        document.querySelectorAll('.tab[aria-controls]').forEach(function(btn) {
          btn.setAttribute('aria-expanded', 'false');
        });

        document.querySelectorAll('.submenu').forEach(function(submenu) {
          submenu.setAttribute('data-open', 'false');
        });
      }
    }

    function toggleSubmenu(button) {
      const controls = button.getAttribute('aria-controls');
      const panel = document.getElementById(controls);
      const expanded = button.getAttribute('aria-expanded') === 'true';

      document.querySelectorAll('.tab[aria-controls]').forEach(function(btn) {
        if (btn !== button) {
          btn.setAttribute('aria-expanded', 'false');
        }
      });

      document.querySelectorAll('.submenu').forEach(function(submenu) {
        if (submenu !== panel) {
          submenu.setAttribute('data-open', 'false');
        }
      });

      button.setAttribute('aria-expanded', String(!expanded));
      if (panel) {
        panel.setAttribute('data-open', String(!expanded));
      }
    }

    function closeOverlayBackground(event) {
      if (event.target === overlay) {
        setOverlay(false);
      }
    }


    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        setOverlay(false);
      }
    });

  </script>

</body>
</html>
